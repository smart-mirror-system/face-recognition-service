name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  security:
    name: Security Analysis
    uses: ./.github/workflows/codeql-security-analysis.yaml
    secrets: inherit
    permissions:
      contents: read
      security-events: write
      packages: read

  docker:
    needs: [security]
    uses: ./.github/workflows/docker.yaml
    secrets: inherit
